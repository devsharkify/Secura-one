<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Secura One</title>
<meta name="theme-color" content="#FAF7F2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  /* Warm paper palette */
  --bg: #FAF7F2;
  --bg-2: #F5F1EA;
  --paper: #FFFFFE;
  --paper-deep: #F2EDE4;

  /* Ink ramp — warm grays */
  --ink: #1F1B16;
  --ink-2: #3D372E;
  --ink-3: #6B6358;
  --ink-4: #9A9388;
  --ink-5: #C5BEB1;

  /* Border ramp — extremely subtle */
  --border: rgba(31,27,22,0.08);
  --border-strong: rgba(31,27,22,0.14);
  --hairline: rgba(31,27,22,0.06);

  /* Accent — heritage forest, used very sparingly */
  --accent: #1F4536;
  --accent-tint: #E8EFEA;
  --accent-strong: #163528;

  /* Brass — for emphasis labels only */
  --brass: #8C6E37;
  --brass-tint: #F5EDD9;

  /* Semantic */
  --danger: #8B2E2E;
  --danger-tint: #F8E8E8;

  /* Shadow tokens — soft paper-like */
  --shadow-sm: 0 1px 2px rgba(31,27,22,0.04), 0 1px 1px rgba(31,27,22,0.03);
  --shadow-md: 0 2px 6px rgba(31,27,22,0.06), 0 1px 2px rgba(31,27,22,0.04);
  --shadow-lg: 0 12px 32px rgba(31,27,22,0.08), 0 4px 8px rgba(31,27,22,0.04);
  --shadow-xl: 0 24px 60px rgba(31,27,22,0.12), 0 8px 16px rgba(31,27,22,0.06);

  /* Type scale */
  --text-xs: 11px;
  --text-sm: 13px;
  --text-base: 15px;
  --text-lg: 17px;

  /* Motion */
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
  --quick: 80ms ease-out;
  --normal: 160ms var(--ease);
  --slow: 280ms var(--ease);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
*, *::before, *::after { -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: var(--text-base);
  line-height: 1.5;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -0.011em;
  font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
}

button { font-family: inherit; font-size: inherit; cursor: pointer; }

/* ============================================================
   DESKTOP STAGE — premium phone frame
   ============================================================ */
.stage {
  min-height: 100vh;
  background: #1A1612;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(140, 110, 55, 0.04), transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(31, 69, 54, 0.06), transparent 50%);
  padding: 48px 32px;
}

.stage-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 56px;
  max-width: 1280px;
  width: 100%;
  margin: 0 auto;
  align-items: start;
}
@media (min-width: 1100px) {
  .stage-grid {
    grid-template-columns: 428px minmax(0, 1fr);
    gap: 80px;
  }
}

/* Phone column — sticky on desktop */
.phone-col {
  display: flex;
  justify-content: center;
}
@media (min-width: 1100px) {
  .phone-col {
    position: sticky;
    top: 48px;
    align-self: start;
  }
}

/* The phone — refined */
.phone {
  width: 400px;
  max-width: 100%;
  background: #1A1612;
  border-radius: 56px;
  padding: 14px;
  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.06),
    0 0 0 2px #2a2622,
    0 50px 120px rgba(0,0,0,0.5),
    0 20px 40px rgba(0,0,0,0.3);
  position: relative;
}
.phone::before {
  content: '';
  position: absolute;
  top: 22px; left: 50%;
  transform: translateX(-50%);
  width: 96px; height: 28px;
  background: #0a0807;
  border-radius: 20px;
  z-index: 10;
}
.phone-screen {
  background: var(--bg);
  border-radius: 42px;
  overflow: hidden;
  height: 800px;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* Status bar */
.status-bar {
  height: 50px;
  flex-shrink: 0;
  display: flex;
  align-items: flex-end;
  padding: 0 28px 12px;
  justify-content: space-between;
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  position: relative;
  z-index: 5;
  letter-spacing: -0.01em;
}
.status-icons { display: flex; gap: 5px; align-items: center; }

/* Mobile — full screen */
@media (max-width: 1099px) {
  .stage { background: var(--bg); padding: 0; min-height: 100vh; }
  .stage::before { display: none; }
  .stage-grid { gap: 0; }
  .phone {
    background: transparent;
    border-radius: 0;
    padding: 0;
    box-shadow: none;
    width: 100%;
  }
  .phone::before { display: none; }
  .phone-screen { border-radius: 0; height: 100vh; height: 100dvh; }
  .status-bar { display: none; }
  .stage-side { display: none !important; }
}

/* ============================================================
   DESKTOP SIDE — editorial info panel
   ============================================================ */
.stage-side {
  color: #E8E0D0;
  padding-top: 16px;
}
.stage-side .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #8C6E37;
  margin-bottom: 24px;
  font-weight: 500;
}
.stage-side h1 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 300;
  font-size: 56px;
  line-height: 0.96;
  letter-spacing: -0.035em;
  color: #F5EFE2;
}
.stage-side h1 em {
  font-style: italic;
  font-weight: 400;
  color: #C8D4CB;
}
.stage-side p {
  margin-top: 20px;
  font-size: 16px;
  line-height: 1.65;
  color: #B0A595;
  max-width: 460px;
  font-weight: 300;
  letter-spacing: -0.005em;
}

.screens-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 40px;
}
.screens-nav button {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 6px 12px;
  border: 1px solid rgba(255,255,255,0.12);
  color: #8C8175;
  background: transparent;
  border-radius: 999px;
  letter-spacing: 0.04em;
  transition: all var(--normal);
}
.screens-nav button:hover {
  border-color: rgba(255,255,255,0.3);
  color: #E8E0D0;
}
.screens-nav button.active {
  background: #F5EFE2;
  color: #1F4536;
  border-color: #F5EFE2;
  font-weight: 500;
}

.specs {
  margin-top: 56px;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.08);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 40px;
}
.spec {
  display: flex; flex-direction: column; gap: 4px;
}
.spec-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #6B6358;
}
.spec-value {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 17px;
  font-weight: 400;
  color: #F5EFE2;
  letter-spacing: -0.01em;
}

/* Side panel — product explainer */
.side-section {
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.side-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #8C6E37;
  font-weight: 500;
  margin-bottom: 16px;
}
.side-h2 {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 300;
  font-size: 28px;
  line-height: 1.1;
  letter-spacing: -0.025em;
  color: #F5EFE2;
  margin-bottom: 16px;
}
.side-h2 em { font-style: italic; font-weight: 400; color: #C8D4CB; }

.side-features {
  display: grid;
  gap: 24px;
}
.side-feature {
  display: grid;
  grid-template-columns: 36px 1fr;
  gap: 14px;
  align-items: flex-start;
}
.side-feature-num {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 300;
  color: #C8D4CB;
  letter-spacing: -0.02em;
  line-height: 1;
  padding-top: 2px;
}
.side-feature-title {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 400;
  color: #F5EFE2;
  letter-spacing: -0.015em;
  margin-bottom: 4px;
}
.side-feature-body {
  font-size: 13px;
  line-height: 1.55;
  color: #A89C88;
  font-weight: 300;
}

/* Trigger timeline (in side panel) */
.timeline {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-top: 12px;
}
.tl-cell {
  border-top: 1px solid rgba(255,255,255,0.16);
  padding-top: 12px;
}
.tl-day {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  color: #8C6E37;
  text-transform: uppercase;
  font-weight: 500;
}
.tl-title {
  font-family: 'Fraunces', serif;
  font-size: 14px;
  font-weight: 400;
  color: #F5EFE2;
  margin-top: 6px;
  letter-spacing: -0.01em;
}
.tl-body {
  font-size: 11px;
  color: #A89C88;
  margin-top: 4px;
  line-height: 1.5;
  font-weight: 300;
}

/* Grouped screen nav */
.screens-grouped { display: grid; gap: 18px; }
.screens-group-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #6B6358;
  font-weight: 500;
  margin-bottom: 8px;
}
.screens-group-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

/* Pricing tiers */
.pricing { display: grid; gap: 8px; margin-top: 12px; }
.pricing-tier {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  padding: 12px 14px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px;
}
.pricing-tier.featured {
  background: rgba(200,212,203,0.08);
  border-color: rgba(200,212,203,0.25);
}
.pricing-name {
  font-family: 'Fraunces', serif;
  font-size: 15px;
  font-weight: 400;
  color: #F5EFE2;
  letter-spacing: -0.01em;
}
.pricing-meta {
  font-size: 11px;
  color: #A89C88;
  margin-top: 3px;
}
.pricing-amount {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 400;
  color: #F5EFE2;
  letter-spacing: -0.02em;
}
.pricing-amount-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: #6B6358;
  text-transform: uppercase;
  text-align: right;
  margin-top: 3px;
}

/* ============================================================
   IN-PHONE — the actual app design
   ============================================================ */
.app {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.app-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 88px;
}

/* App bar — minimal, gets out of the way */
.bar {
  background: var(--bg);
  padding: 16px 20px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  z-index: 20;
}
.bar-back, .bar-icon {
  width: 40px; height: 40px;
  display: grid; place-items: center;
  background: transparent;
  border: none;
  color: var(--ink-2);
  border-radius: 10px;
  margin-left: -8px;
  transition: background var(--quick);
}
.bar-back:hover, .bar-icon:hover { background: var(--paper-deep); }
.bar-back:active, .bar-icon:active { background: var(--paper-deep); transform: scale(0.96); }
.bar-mark {
  display: flex; align-items: center; gap: 10px;
  cursor: pointer;
}
.bar-mark-glyph {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 8px;
  display: grid; place-items: center;
  color: var(--bg);
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 14px;
}
.bar-mark-text {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--ink);
}

/* Content surfaces */
.page { padding: 12px 20px 24px; }

/* Page heading — typography is the design */
.kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--brass);
  margin-bottom: 12px;
}
.headline {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 300;
  font-size: 38px;
  line-height: 1.04;
  letter-spacing: -0.035em;
  color: var(--ink);
}
.headline em {
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.lede {
  margin-top: 16px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--ink-3);
  letter-spacing: -0.005em;
  font-weight: 400;
}

/* Buttons — restrained, premium */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 18px;
  font-size: 14px;
  font-weight: 500;
  border-radius: 10px;
  transition: all var(--normal);
  border: none;
  letter-spacing: -0.005em;
  font-family: inherit;
}
.btn:active { transform: scale(0.98); }

.btn-primary {
  background: var(--ink);
  color: var(--bg);
  box-shadow: 0 1px 2px rgba(31,27,22,0.12);
}
.btn-primary:hover { background: var(--accent); box-shadow: var(--shadow-md); }

.btn-secondary {
  background: var(--paper);
  color: var(--ink);
  box-shadow: var(--shadow-sm);
}
.btn-secondary:hover { box-shadow: var(--shadow-md); }

.btn-ghost {
  background: transparent;
  color: var(--ink-3);
  padding: 10px 14px;
}
.btn-ghost:hover { color: var(--ink); background: var(--paper-deep); }

.btn-block { width: 100%; }
.btn-lg { padding: 16px 22px; font-size: 15px; }
.btn-sm { padding: 8px 14px; font-size: 13px; }

/* Inputs — subtle, paper-like */
.field { margin-bottom: 18px; }
.field-label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-2);
  margin-bottom: 7px;
  letter-spacing: -0.005em;
}
.input {
  width: 100%;
  padding: 13px 14px;
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: inherit;
  font-size: 16px;
  color: var(--ink);
  transition: all var(--normal);
  box-shadow: var(--shadow-sm);
}
.input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: var(--shadow-sm), 0 0 0 3px var(--accent-tint);
}
.input.mono {
  font-family: 'JetBrains Mono', monospace;
  letter-spacing: 0.02em;
}
.field-help {
  font-size: 12px;
  color: var(--ink-4);
  margin-top: 6px;
  line-height: 1.5;
}

/* Surface — primary content card */
.surface {
  background: var(--paper);
  border-radius: 14px;
  border: 1px solid var(--hairline);
  padding: 20px;
  box-shadow: var(--shadow-sm);
}
.surface-flush { background: transparent; padding: 0; border: none; box-shadow: none; }

.surface-deep {
  background: var(--accent);
  color: var(--bg);
  border-radius: 14px;
  padding: 20px;
  box-shadow: var(--shadow-md);
}

/* Hairline divider */
.hr { height: 1px; background: var(--hairline); margin: 16px 0; border: none; }
.hr-strong { height: 1px; background: var(--border); margin: 20px 0; border: none; }

/* Stat — numbers as the design */
.stats { display: grid; gap: 12px; }
.stat {
  background: transparent;
  padding: 0;
}
.stat-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-4);
  font-weight: 500;
  margin-bottom: 6px;
}
.stat-value {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 30px;
  font-weight: 300;
  line-height: 1;
  letter-spacing: -0.025em;
  color: var(--ink);
}
.stat-value-sm {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0;
  color: var(--ink-4);
  margin-left: 2px;
}

/* List item — premium */
.row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 0;
  cursor: pointer;
  transition: padding var(--quick);
}
.row + .row { border-top: 1px solid var(--hairline); }
.row:active { padding-left: 4px; }
.row-main { flex: 1; min-width: 0; }
.row-title {
  font-size: 15px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: -0.01em;
}
.row-sub {
  font-size: 13px;
  color: var(--ink-4);
  margin-top: 3px;
  font-weight: 400;
}
.row-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-4);
  flex-shrink: 0;
  letter-spacing: 0.02em;
}
.row-chevron {
  color: var(--ink-5);
  width: 16px; height: 16px;
  flex-shrink: 0;
}

/* Item icon — quiet square */
.row-icon {
  width: 36px; height: 36px;
  flex-shrink: 0;
  border-radius: 9px;
  background: var(--paper-deep);
  display: grid; place-items: center;
  color: var(--ink-2);
}

/* Tag/Pill — restrained */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0;
  background: var(--paper-deep);
  color: var(--ink-3);
  white-space: nowrap;
  border: none;
  font-family: inherit;
  cursor: pointer;
  transition: all var(--quick);
}
.tag-success { background: var(--accent-tint); color: var(--accent); }
.tag-warning { background: var(--brass-tint); color: var(--brass); }
.tag-active { background: var(--ink); color: var(--bg); }

/* Section nav — Notion-style segmented */
.segments {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  padding: 4px 0;
  scrollbar-width: none;
  margin: 0 -20px;
  padding-left: 20px; padding-right: 20px;
}
.segments::-webkit-scrollbar { display: none; }
.segment {
  flex-shrink: 0;
  padding: 7px 13px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-3);
  background: transparent;
  border: none;
  border-radius: 8px;
  letter-spacing: -0.005em;
  transition: all var(--normal);
  font-family: inherit;
}
.segment:hover { color: var(--ink); background: var(--paper-deep); }
.segment.active { color: var(--ink); background: var(--paper); box-shadow: var(--shadow-sm); }
.segment-count { color: var(--ink-4); font-weight: 400; margin-left: 4px; }
.segment.active .segment-count { color: var(--ink-3); }

/* Inline notice (replaces noisy banners) */
.notice {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  box-shadow: var(--shadow-sm);
}
.notice-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 6px;
}
.notice-dot-warn { background: var(--brass); }
.notice-dot-success { background: var(--accent); }
.notice-title { font-size: 13px; font-weight: 500; }
.notice-body { font-size: 13px; color: var(--ink-3); margin-top: 2px; line-height: 1.55; }

/* Bottom navigation — floating segment, very Notion */
.dock {
  position: absolute;
  left: 16px; right: 16px; bottom: 16px;
  background: var(--paper);
  border-radius: 16px;
  padding: 6px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--hairline);
  z-index: 20;
}

              </div>
              <div className="tl-cell">

                <div className="tl-body">Lawyer + 21-day hold + share.</div>
              </div>
            </div>
          </div>

          {/* Pricing */}
          <div className="side-section">
            <div className="side-eyebrow">Pricing — annual subscription</div>
            <div className="pricing">
              <div className="pricing-tier">
                <div>
                  <div className="pricing-name">Essential</div>
                  <div className="pricing-meta">Vault · 5 nominees · 15-day check-in</div>
                </div>
                <div>
                  <div className="pricing-amount">₹2,400</div>
                  <div className="pricing-amount-sub">per year</div>
                </div>
              </div>
              <div className="pricing-tier featured">
                <div>
                  <div className="pricing-name">Estate</div>
                  <div className="pricing-meta">+ Will generation · eSign · 15 nominees · lawyer panel</div>

                <div>
                  <div className="pricing-name">Family Office</div>

                  <div className="pricing-amount">₹24,999</div>
                  <div className="pricing-amount-sub">per year</div>

              </div>
            </div>
          </div>

          {/* Screens */}
          <div className="side-section">
            <div className="side-eyebrow">Walk through 21 screens</div>
            <div className="screens-grouped">
              {SCREEN_GROUPS.map(g => (
                <div key={g.label}>
                  <div className="screens-group-label">{g.label}</div>
                  <div className="screens-group-pills">
                    {g.screens.map(([id, label]) => (
                      <button
                        key={id}
                        className={`${screen === id ? 'active' : ''}`}
                        style={{
                          fontFamily: 'JetBrains Mono, monospace',
                          fontSize: 11,
                          padding: '5px 10px',
                          border: `1px solid ${screen === id ? '#F5EFE2' : 'rgba(255,255,255,0.12)'}`,
                          color: screen === id ? '#1F4536' : '#8C8175',
                          background: screen === id ? '#F5EFE2' : 'transparent',
                          borderRadius: 999,
                          letterSpacing: '0.04em',
                          fontWeight: screen === id ? 500 : 400,
                          cursor: 'pointer',
                          transition: 'all 160ms cubic-bezier(0.16, 1, 0.3, 1)',
                        }}
                        onClick={() => setScreen(id)}
                      >
                        {label}
                      </button>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Specs */}
          <div className="specs">
            <div className="spec">
              <div className="spec-label">Encryption</div>

            <div className="spec">

            </div>
            <div className="spec">

            <div className="spec">
